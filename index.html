<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌳 ระบบผังเครือญาติมาตรฐานอัตโนมัติ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        
        /* ─── โครงสร้างระเบียบผังต้นไม้แบบแท้จริง (Level-based Tree) ─── */
        .tree-container, .tree-container ul {
            display: flex;
            justify-content: center;
            padding: 0;
            margin: 0;
            list-style: none;
        }
        .tree-container ul {
            padding-top: 35px;
            position: relative;
        }
        /* เส้นตั้งเชื่อมโยงจากพ่อแม่ลงไปที่สายลูก */
        .tree-container ul::before {
            content: '';
            position: absolute; top: 0; left: 50%;
            border-left: 2px solid #94a3b8;
            width: 0; height: 35px;
        }
        .tree-container li {
            text-align: center;
            position: relative;
            padding: 35px 10px 0 10px;
        }
        /* เส้นแนวนอนเชื่อมโยงในกลุ่มรุ่นเดียวกัน */
        .tree-container li::before, .tree-container li::after {
            content: '';
            position: absolute; top: 0; right: 50%;
            border-top: 2px solid #94a3b8;
            width: 50%; height: 35px;
        }
        .tree-container li::after {
            right: auto; left: 50%;
            border-left: 2px solid #94a3b8;
        }
        .tree-container li:only-child::after, .tree-container li:only-child::before { display: none; }
        .tree-container li:only-child { padding-top: 0; }
        .tree-container li:first-child::before, .tree-container li:last-child::after { border: 0 none; }
        .tree-container li:last-child::before { border-right: 2px solid #94a3b8; border-radius: 0 6px 0 0; }
        .tree-container li:first-child::after { border-radius: 6px 0 0 0; }

        /* การ์ดแกนกลางความสัมพันธ์ (บล็อกพ่อ+แม่เคียงข้างกันในระนาบเดียว) */
        .couple-block {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            padding: 6px;
            border-radius: 16px;
            border: 2px solid #cbd5e1;
            gap: 6px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }
        .member-card {
            width: 175px;
            padding: 10px;
            border-radius: 12px;
            text-align: left;
            font-size: 12px;
            position: relative;
        }
        .swal-field { width: 100% !important; margin: 6px 0 !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-gradient-to-r from-slate-800 to-slate-900 text-white shadow-md py-4 px-6">
        <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-diagram-project text-2xl text-amber-400"></i>
                <div>
                    <h1 class="text-xl font-bold">ผังเครือญาติอัตโนมัติตามลำดับขั้น (Family Tree Standard)</h1>
                    <p class="text-xs text-slate-400">จัดระดับชั้นสามีภรรยาและรุ่นลูกหลานอย่างเสมอกัน</p>
                </div>
            </div>
            <button onclick="openAddModal(null, null, 'blood')" class="bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold text-sm px-4 py-2.5 rounded-xl shadow transition">
                <i class="fa-solid fa-crown"></i> เพิ่มต้นตระกูลหลัก
            </button>
        </div>
    </nav>

    <main class="flex-grow p-4 md:p-6 container mx-auto">
        <div class="bg-white rounded-2xl shadow border border-slate-200 overflow-hidden">
            <div class="p-4 bg-slate-50 border-b border-slate-200 flex justify-between text-xs text-slate-500 font-medium">
                <div><i class="fa-solid fa-info-circle text-blue-500"></i> แผนผังจะแยกสีตามเพศ: ชาย (ฟ้า) ภรรยา/หญิง (ชมพู) และจัดรุ่นระดับเสมอกันทางระนาบ</div>
                <button onclick="loadFamilyData()" class="text-slate-600 hover:text-slate-900"><i class="fa-solid fa-sync"></i> รีเฟรช</button>
            </div>
            
            <div class="overflow-auto p-8 bg-slate-50/40 min-h-[60vh]">
                <div class="tree-container" id="tree-root">
                    <p class="text-slate-400 text-sm mt-10">กำลังเรียกฐานข้อมูลตระกูล...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // วาง Web App URL ตัวใหม่ล่าสุดของคุณลงในนี้
        const API_URL = "https://script.google.com/macros/s/AKfycbxGus8rRD26re2MlihZ16OYjuXmfwV9BcYVlG3GGJj91Dsd-c5yEZCDTaSqXM7JUe14WQ/exec"; 
        let familyData = [];

        async function loadFamilyData() {
            try {
                const response = await fetch(API_URL);
                familyData = await response.json();
                renderFamilyTree();
            } catch (error) {
                console.error(error);
                Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมฐานข้อมูลได้', 'error');
            }
        }

        function renderFamilyTree() {
            const container = document.getElementById('tree-root');
            if (familyData.length === 0) {
                container.innerHTML = `<p class="text-slate-400 text-sm mt-10">ไม่พบรายชื่อในระบบ คลิกเพิ่มต้นตระกูลหลักด้านบนได้เลยครับ</p>`;
                return;
            }

            // ค้นหาต้นตระกูลแรกสุด (ไม่มีพ่อ ไม่มีแม่ และไม่ใช่สะใภ้ขยับเข้ามา)
            const roots = familyData.filter(m => !m.fatherId && !m.motherId && m.type !== 'spouse');
            if(roots.length === 0 && familyData.length > 0) roots.push(familyData[0]);

            let html = '<ul>';
            roots.forEach(root => {
                html += buildNodeHtml(root);
            });
            html += '</ul>';
            container.innerHTML = html;
        }

        // ฟังก์ชันสร้างระดับชั้นความสัมพันธ์ (สร้างบล็อกกลุ่ม พ่อ+แม่ และแตกแถวลูกๆ เป็นหน้ากระดาน)
        function buildNodeHtml(member) {
            // ค้นหาคู่สมรสของคนนี้
            let spouses = [];
            if (member.spouses) {
                const sIds = member.spouses.split(',');
                sIds.forEach(id => {
                    const match = familyData.find(m => m.id === id.trim());
                    if (match) spouses.push(match);
                });
            }

            // เรนเดอร์ฝั่งตัวการ์ดหลักและคู่แต่งงานให้อยู่ในบล็อกเดียวกัน (Level เดียวกัน)
            let coupleHtml = `<div class="couple-block">`;
            coupleHtml += createSingleCardHtml(member);
            
            spouses.forEach(spouse => {
                coupleHtml += createSingleCardHtml(spouse);
            });
            coupleHtml += `</div>`;

            // ดึงข้อมูลลูกทุกคน (คนที่มีพ่อ หรือแม่ เป็นคนคู่นี้)
            // รวบรวม ID ทั้งหมดของกลุ่มคู่เพื่อป้องกันลูกตกหล่น
            const parentsIds = [member.id, ...spouses.map(s => s.id)];
            const children = familyData.filter(m => parentsIds.includes(m.fatherId) || parentsIds.includes(m.motherId));

            let nodeHtml = `<li>${coupleHtml}`;
            
            // หากมีลูก ให้แตกแถวลงด้านล่างเป็นกลุ่มเดียวกัน (Level ต่ำลงไปเสมอกันทั้งหมด)
            if (children.length > 0) {
                nodeHtml += `<ul>`;
                children.forEach(child => {
                    nodeHtml += buildNodeHtml(child);
                });
                nodeHtml += `</ul>`;
            }
            nodeHtml += `</li>`;
            
            return nodeHtml;
        }

        // ฟังก์ชันวาดรูปการ์ดเดี่ยว แบ่งสีตามเพศ: ชาย (ฟ้า) / หญิง (ชมพู)
        function createSingleCardHtml(m) {
            const isMale = m.gender === 'male';
            const bgClass = isMale ? 'bg-sky-50 border-sky-200 text-sky-900' : 'bg-rose-50 border-rose-200 text-rose-900';
            const textGender = isMale ? '<span class="text-blue-500">นาย</span>' : '<span class="text-pink-500">นาง/น.ส.</span>';
            const defaultImg = isMale ? 'https://cdn-icons-png.flaticon.com/512/4128/4128176.png' : 'https://cdn-icons-png.flaticon.com/512/4128/4128246.png';

            return `
                <div class="member-card border ${bgClass} shadow-sm">
                    <div class="flex items-center gap-2 mb-1">
                        <img src="${m.imageUrl || defaultImg}" class="w-8 h-8 rounded-full border bg-white object-cover" onerror="this.src='${defaultImg}'">
                        <div class="truncate w-28">
                            <div class="font-bold text-[11px] truncate">${textGender} ${m.firstName}</div>
                            <div class="text-[9px] text-slate-500 truncate">${m.lastName || ''}</div>
                        </div>
                    </div>
                    <div class="text-[10px] space-y-0.5 text-slate-600 border-t pt-1 border-slate-200/60">
                        <div><b>ชื่อเล่น:</b> ${m.nickname || '-'}</div>
                        <div class="truncate"><b>เบอร์:</b> ${m.phone || '-'}</div>
                    </div>
                    <div class="mt-2 pt-1 border-t border-slate-200/60 flex justify-between text-[10px]">
                        <button onclick="openEditModal('${m.id}')" class="text-indigo-600 font-medium hover:underline">แก้ไข</button>
                        ${m.type !== 'spouse' ? `
                            <button onclick="openAddModal('${m.id}', null, 'spouse')" class="text-rose-500 font-medium hover:underline">+คู่สมรส</button>
                            <button onclick="openAddModal('${m.gender==='male'?m.id:''}', '${m.gender==='female'?m.id:''}', 'blood')" class="text-emerald-600 font-bold hover:underline">+ลูก</button>
                        ` : ''}
                        <button onclick="deleteMember('${m.id}')" class="text-red-500 font-medium hover:underline"><i class="fa-regular fa-trash-can"></i></button>
                    </div>
                </div>
            `;
        }

        // หน้าต่างเพิ่มสมาชิก (มีช่องเพศให้เลือกแล้ว)
        function openAddModal(fatherId, motherId, type) {
            Swal.fire({
                title: type === 'spouse' ? '💞 เพิ่มคู่สมรสใหม่' : '👶 เพิ่มทายาท (สายลูก)',
                html: `
                    <div class="text-left text-xs space-y-1.5 p-1">
                        <label class="font-bold text-slate-700">เพศสภาพ</label>
                        <select id="swal-gender" class="swal2-input swal-field text-sm">
                            <option value="male">ชาย (Male)</option>
                            <option value="female">หญิง (Female)</option>
                        </select>
                        <label class="font-bold text-slate-700 block mt-2">ชื่อจริง</label>
                        <input id="swal-firstName" class="swal2-input swal-field" placeholder="ชื่อจริง">
                        <label class="font-bold text-slate-700 block">นามสกุล</label>
                        <input id="swal-lastName" class="swal2-input swal-field" placeholder="นามสกุล">
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="font-bold text-slate-700">ชื่อเล่น</label>
                                <input id="swal-nickname" class="swal2-input swal-field" placeholder="ชื่อเล่น">
                            </div>
                            <div>
                                <label class="font-bold text-slate-700">วันเกิด</label>
                                <input id="swal-birthDate" type="date" class="swal2-input swal-field">
                            </div>
                        </div>
                        <label class="font-bold text-slate-700 block">เบอร์โทร</label>
                        <input id="swal-phone" class="swal2-input swal-field" placeholder="เบอร์ติดต่อ">
                        <label class="font-bold text-slate-700 block">ที่อยู่</label>
                        <input id="swal-address" class="swal2-input swal-field" placeholder="ที่อยู่ปัจจุบัน">
                        <label class="font-bold text-slate-700 block">URL รูปภาพ</label>
                        <input id="swal-imageUrl" class="swal2-input swal-field" placeholder="ลิงก์รูปภาพ">
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'บันทึก',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: '#0f766e',
                preConfirm: () => {
                    const fn = document.getElementById('swal-firstName').value.trim();
                    if (!fn) return Swal.showValidationMessage('กรุณากรอกชื่อจริง');
                    return {
                        firstName: fn,
                        lastName: document.getElementById('swal-lastName').value.trim(),
                        nickname: document.getElementById('swal-nickname').value.trim(),
                        birthDate: document.getElementById('swal-birthDate').value,
                        address: document.getElementById('swal-address').value.trim(),
                        phone: document.getElementById('swal-phone').value.trim(),
                        imageUrl: document.getElementById('swal-imageUrl').value.trim(),
                        gender: document.getElementById('swal-gender').value,
                        fatherId: fatherId || "",
                        motherId: motherId || "",
                        type: type,
                        spouses: ""
                    }
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    showLoad('กำลังเซฟข้อมูลลง Google Sheets...');
                    let data = result.value;
                    
                    // กรณีสร้างคู่แต่งงาน
                    let mainId = fatherId || motherId;
                    if (type === 'spouse' && mainId) {
                        data.spouses = mainId;
                    }

                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'create', data: data }) });
                    const resJson = await res.json();

                    if (resJson.status === 'success' && type === 'spouse' && mainId) {
                        const newId = resJson.data.id;
                        const mainMember = familyData.find(m => m.id === mainId);
                        if (mainMember) {
                            let arr = mainMember.spouses ? mainMember.spouses.split(',') : [];
                            arr.push(newId);
                            mainMember.spouses = arr.join(',');
                            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'update', data: mainMember }) });
                        }
                    }
                    Swal.close();
                    loadFamilyData();
                }
            });
        }

        // หน้าต่างแก้ไขข้อมูล (UPDATE)
        function openEditModal(id) {
            const m = familyData.find(x => x.id === id);
            if (!m) return;
            let bDate = m.birthDate ? m.birthDate.split('T')[0] : '';

            Swal.fire({
                title: `📝 แก้ไขข้อมูล`,
                html: `
                    <div class="text-left text-xs space-y-1.5 p-1">
                        <label class="font-bold text-slate-700">เพศสภาพ</label>
                        <select id="swal-gender" class="swal2-input swal-field text-sm">
                            <option value="male" ${m.gender==='male'?'selected':''}>ชาย (Male)</option>
                            <option value="female" ${m.gender==='female'?'selected':''}>หญิง (Female)</option>
                        </select>
                        <label class="font-bold text-slate-700 block mt-2">ชื่อจริง</label>
                        <input id="swal-firstName" class="swal2-input swal-field" value="${m.firstName||''}">
                        <label class="font-bold text-slate-700 block">นามสกุล</label>
                        <input id="swal-lastName" class="swal2-input swal-field" value="${m.lastName||''}">
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="font-bold text-slate-700">ชื่อเล่น</label>
                                <input id="swal-nickname" class="swal2-input swal-field" value="${m.nickname||''}">
                            </div>
                            <div>
                                <label class="font-bold text-slate-700">วันเกิด</label>
                                <input id="swal-birthDate" type="date" class="swal2-input swal-field" value="${bDate}">
                            </div>
                        </div>
                        <label class="font-bold text-slate-700 block">เบอร์โทร</label>
                        <input id="swal-phone" class="swal2-input swal-field" value="${m.phone||''}">
                        <label class="font-bold text-slate-700 block">ที่อยู่</label>
                        <input id="swal-address" class="swal2-input swal-field" value="${m.address||''}">
                        <label class="font-bold text-slate-700 block">URL รูปภาพ</label>
                        <input id="swal-imageUrl" class="swal2-input swal-field" value="${m.imageUrl||''}">
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'อัปเดต',
                preConfirm: () => {
                    return {
                        id: m.id,
                        firstName: document.getElementById('swal-firstName').value.trim(),
                        lastName: document.getElementById('swal-lastName').value.trim(),
                        nickname: document.getElementById('swal-nickname').value.trim(),
                        birthDate: document.getElementById('swal-birthDate').value,
                        address: document.getElementById('swal-address').value.trim(),
                        phone: document.getElementById('swal-phone').value.trim(),
                        imageUrl: document.getElementById('swal-imageUrl').value.trim(),
                        gender: document.getElementById('swal-gender').value,
                        fatherId: m.fatherId, motherId: m.motherId, spouses: m.spouses, type: m.type
                    }
                }
            }).then(async (res) => {
                if (res.isConfirmed) {
                    showLoad('กำลังบันทึกข้อมูลแก้ไข...');
                    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'update', data: res.value }) });
                    Swal.close();
                    loadFamilyData();
                }
            });
        }

        // ลบสมาชิก (DELETE)
        function deleteMember(id) {
            Swal.fire({
                title: 'ยืนยันลบข้อมูล?',
                text: "รายชื่อบุคคลนี้จะหายไปจากผังตระกูล",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'ใช่, ลบเลย'
            }).then(async (res) => {
                if (res.isConfirmed) {
                    showLoad('กำลังทำรายการลบ...');
                    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) });
                    Swal.close();
                    loadFamilyData();
                }
            });
        }

        function showLoad(msg) { Swal.fire({ title: msg, allowOutsideClick: false, didOpen: () => Swal.showLoading() }); }
        
        window.onload = loadFamilyData;
    </script>
</body>
</html>
